<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarocchi dell'Anima — Cartomanzia Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- IL TUO STILE ORIGINALE --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --gold: #C9A84C; --gold-light: #E8C97A; --deep: #0D0A1A;
            --surface: #231B38; --surface2: #2D2347; --text: #EDE0C4;
            --text-muted: #9A8A6E; --mystic: #C4A1E8; --border: rgba(201,168,76,0.25);
        }
        body {
            background: var(--deep); color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px; line-height: 1.7; min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(1px 1px at 10% 15%, white 0.5, transparent 100%),
                              radial-gradient(1px 1px at 80% 20%, var(--gold) 0.3, transparent 100%);
            pointer-events: none; z-index: 0;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
        nav { position: sticky; top: 0; z-index: 100; background: rgba(13,10,26,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 0; }
        .nav-logo { font-family: 'Cinzel Decorative', cursive; color: var(--gold); text-decoration: none; font-size: 14px; }
        
        /* Layout */
        .hero { text-align: center; padding: 80px 0 50px; }
        h1 { font-family: 'Cinzel Decorative', cursive; font-size: clamp(30px, 6vw, 55px); color: var(--gold-light); margin-bottom: 15px; }
        .input-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 35px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold); margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 18px; padding: 15px; min-height: 120px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--gold); }

        /* Bottoni */
        .btn { width: 100%; padding: 16px; margin-top: 15px; background: linear-gradient(135deg,#3D2B6B,#5C3D9A); border: 1px solid var(--gold); border-radius: 10px; color: var(--gold-light); font-family: 'Cinzel', serif; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Carte */
        .cards-spread { display: flex; gap: 20px; justify-content: center; margin: 40px 0; flex-wrap: wrap; perspective: 1000px; }
        .tarot-card { width: 150px; height: 260px; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .tarot-card.flipped { transform: rotateY(180deg); }
        .card-back, .card-front { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .card-back { background: var(--surface2); color: var(--gold); font-size: 40px; }
        .card-front { background: linear-gradient(160deg, #1E1535, #2D2040); transform: rotateY(180deg); padding: 15px; text-align: center; }

        /* Responso */
        .result-area { background: rgba(35, 27, 56, 0.9); border: 1px solid var(--gold); border-radius: 16px; padding: 35px; margin-top: 30px; display: none; animation: fadeIn 1s; }
        .visible { display: block; }
        .reading-text { font-size: 20px; line-height: 1.8; }
        .reading-text em { color: var(--mystic); font-style: italic; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading { font-style: italic; color: var(--gold); text-align: center; padding: 20px; }
    </style>
</head>
<body>

<nav><div class="container"><a href="#" class="nav-logo">✦ TAROCCHI DELL'ANIMA</a></div></nav>

<div class="container">
    <section class="hero">
        <h1>L'Oracolo Mistico</h1>
        <p>Svela il tuo destino attraverso il linguaggio segreto degli Arcani.</p>
    </section>

    <div class="input-box">
        <h2>Lettura delle Tre Carte</h2>
        <textarea id="qInput" placeholder="Quale domanda tormenta il tuo spirito?"></textarea>
        <button class="btn" id="btnT" onclick="startReading()">✦ Rivela le Carte ✦</button>
    </div>

    <div class="cards-spread" id="spread" style="display:none">
        <div class="tarot-card" id="c0"><div class="card-back">✦</div><div class="card-front" id="f0"></div></div>
        <div class="tarot-card" id="c1"><div class="card-back">✦</div><div class="card-front" id="f1"></div></div>
        <div class="tarot-card" id="c2"><div class="card-back">✦</div><div class="card-front" id="f2"></div></div>
    </div>

    <div class="result-area" id="resT">
        <div id="contT" class="reading-text"></div>
        <button class="btn" style="background:transparent; font-size:12px;" onclick="location.reload()">↺ Nuova Consultazione</button>
    </div>

    <div class="input-box" style="margin-top: 80px;">
        <h2>Interpretazione dei Sogni</h2>
        <textarea id="dInput" placeholder="Descrivi il tuo sogno nei dettagli..."></textarea>
        <button class="btn" style="background:linear-gradient(135deg,#1A3550,#254D75);" id="btnD" onclick="interpretDream()">🌙 Svela il Sogno</button>
    </div>

    <div class="result-area" id="resD">
        <div id="contD" class="reading-text"></div>
    </div>
</div>

<script>
    // --- IL TUO WEBHOOK DI MAKE ---
    const WEBHOOK = "https://hook.eu1.make.com/wdc6niacrxs2vlmssjbd592ymzw2859w";

    const DECK = [
        {n:'I', name:'Il Mago', s:'🪄'}, {n:'II', name:'La Papessa', s:'📖'}, {n:'III', name:'L\'Imperatrice', s:'🌺'},
        {n:'IV', name:'L\'Imperatore', s:'⚔️'}, {n:'VI', name:'Gli Amanti', s:'💞'}, {n:'X', name:'La Ruota', s:'☸️'},
        {n:'XIII', name:'La Morte', s:'🌑'}, {n:'XVIII', name:'La Luna', s:'🌕'}, {n:'XIX', name:'Il Sole', s:'☀️'},
        {n:'XXI', name:'Il Mondo', s:'🌍'}, {n:'0', name:'Il Matto', s:'🌟'}
    ];

    async function askMake(data) {
        const r = await fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return await r.text();
    }

    async function startReading() {
        const q = document.getElementById('qInput').value.trim();
        if(!q) return;

        document.getElementById('btnT').disabled = true;
        const drawn = [...DECK].sort(() => 0.5 - Math.random()).slice(0, 3);
        
        document.getElementById('spread').style.display = 'flex';
        drawn.forEach((c, i) => {
            document.getElementById('f' + i).innerHTML = `<div style="font-size:45px">${c.s}</div><div style="font-family:Cinzel; color:var(--gold); margin-top:10px">${c.name}</div>`;
            setTimeout(() => document.getElementById('c' + i).classList.add('flipped'), i * 600);
        });

        const resBox = document.getElementById('resT');
        const cont = document.getElementById('contT');
        resBox.classList.add('visible');
        cont.innerHTML = `<div class="loading">L'Oracolo sta leggendo la trama del destino...</div>`;

        try {
            const reply = await askMake({
                type: "tarocchi",
                question: q,
                cards: drawn.map(c => c.name).join(", ")
            });
            // Converte il testo tra asterischi in grassetto/corsivo magico
            cont.innerHTML = reply.replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/\n/g, '<br>');
        } catch (e) {
            cont.innerHTML = "La connessione con l'etere è interrotta. Riprova più tardi.";
        }
    }

    async function interpretDream() {
        const d = document.getElementById('dInput').value.trim();
        if(!d) return;

        const resBox = document.getElementById('resD');
        const cont = document.getElementById('contD');
        resBox.classList.add('visible');
        cont.innerHTML = `<div class="loading">Viaggiando nei regni di Morfeo...</div>`;

        try {
            const reply = await askMake({
                type: "sogno",
                dream: d
            });
            cont.innerHTML = reply.replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/\n/g, '<br>');
        } catch (e) {
            cont.innerHTML = "Il sogno è svanito prima di essere compreso.";
        }
    }
</script>
</body>
</html>
