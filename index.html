<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarocchi dell'Anima — Cartomanzia Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET E VARIABILI --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --gold: #C9A84C; --gold-light: #E8C97A; --deep-space: #0D0A1A;
            --surface: rgba(35, 27, 56, 0.4); --text: #EDE0C4; --text-muted: #9A8A6E;
            --border: rgba(201, 168, 76, 0.2); --mystic: #C4A1E8;
        }

        body {
            background-color: var(--deep-space); color: var(--text);
            font-family: 'Cormorant Garamond', serif; font-size: 19px; line-height: 1.7;
            overflow-x: hidden; position: relative;
        }

        /* SFONDO STELLATO DINAMICO */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px), 
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(circle at center, #1a152e 0%, #0d0a1a 100%);
            background-size: 550px 550px, 350px 350px, 100% 100%;
            background-position: 0 0, 40px 60px, center;
            z-index: -1; opacity: 0.5;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* NAVBAR */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(13, 10, 26, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); padding: 15px 0;
        }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 20px;}
        .nav-logo { font-family: 'Cinzel Decorative', cursive; color: var(--gold); text-decoration: none; font-size: 13px; letter-spacing: 0.1em; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        .credit-badge { 
            font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); border: 1px solid var(--gold); 
            padding: 4px 12px; border-radius: 50px; background: rgba(201, 168, 76, 0.1);
            cursor: pointer; transition: 0.3s; white-space: nowrap;
        }

        .nav-links { display: flex; gap: 15px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-family: 'Cinzel', serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }

        /* SEZIONI */
        .content-section { display: none; padding: 140px 0 80px; animation: fadeIn 0.8s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-family: 'Cinzel Decorative', cursive; color: var(--gold-light); font-size: clamp(40px, 8vw, 80px); text-align: center; line-height: 1; margin-bottom: 20px; }
        h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 28px; text-align: center; margin-bottom: 30px; letter-spacing: 3px; }
        
        .glass-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; backdrop-filter: blur(10px); margin-top: 20px; }
        textarea { width: 100%; background: rgba(13, 10, 26, 0.6); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 18px; font-family: 'Cormorant Garamond', serif; font-size: 18px; outline: none; margin-bottom: 20px; resize: none; min-height: 150px; }
        
        .btn-action {
            width: 100%; padding: 18px; border-radius: 12px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.2em;
            cursor: pointer; transition: 0.4s; text-transform: uppercase; border: 1px solid var(--gold); 
            background: linear-gradient(90deg, #3D2B6B, #5C3D9A); color: white;
        }
        .btn-action:hover { background: var(--gold); color: var(--deep-space); box-shadow: 0 0 20px rgba(201,168,76,0.3); }

        /* TAG SOGNI */
        .tag-container { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tag-btn { 
            background: rgba(201, 168, 76, 0.05); border: 1px solid var(--border); border-radius: 50px; 
            color: var(--text); padding: 8px 16px; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .tag-btn.active { background: var(--gold); color: var(--deep-space); border-color: var(--gold); }

        /* RISULTATI */
        .result-box { display: none; margin-top: 30px; padding: 30px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); border-radius: 20px; animation: fadeIn 1s; }
        .result-content strong { color: var(--gold-light); font-weight: bold; }
        .summary-box { background: rgba(201,168,76,0.1); border-left: 3px solid var(--gold); padding: 20px; margin-bottom: 25px; font-style: italic; border-radius: 0 10px 10px 0; }

        /* TAROCCHI */
        .cards-spread { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .tarot-card { width: 140px; height: 240px; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s; }
        .tarot-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 10px; border: 1px solid var(--gold); }
        .card-back { background: #1A152E; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 30px; }
        .card-front { background: #1E1535; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; padding: 8px; }
        .tarot-image { width: 100%; height: 80%; object-fit: cover; border-radius: 5px; }

        /* MODAL 7 LIVELLI */
        #paymentModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px; }
        .modal-content { background: #151126; border: 1px solid var(--gold); padding: 30px; border-radius: 25px; max-width: 600px; width: 100%; text-align: center; max-height: 90vh; overflow-y: auto; }
        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin: 20px 0; }
        .pay-card { background: rgba(201, 168, 76, 0.05); border: 1px solid var(--border); padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; }
        .pay-card:hover, .pay-card.active { border-color: var(--gold); background: rgba(201, 168, 76, 0.15); transform: translateY(-3px); }
        .pay-card h4 { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold-light); margin-bottom: 5px; }
        .pay-card .cr-val { font-size: 20px; font-weight: bold; color: #fff; }
        .pay-card .price-val { font-size: 14px; color: var(--mystic); }
        .pay-card.featured { border: 1px solid var(--gold); background: rgba(201,168,76,0.1); position: relative; }
        .pay-card.featured::after { content: 'TOP'; position: absolute; top: -10px; right: -10px; background: var(--gold); color: #000; font-size: 8px; padding: 2px 6px; border-radius: 5px; font-weight: bold; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            nav { padding: 10px 0; }
            .nav-inner { flex-direction: column; gap: 10px; }
            .content-section { padding: 180px 0 60px; }
            .tarot-card { width: 90px; height: 160px; }
            .price-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 45px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a class="nav-logo" onclick="showSection('home')">✦ TAROCCHI DELL'ANIMA</a>
        <div class="nav-right">
            <div class="credit-badge" onclick="openPayment()">✨ Crediti: <span id="creditCount">0</span></div>
            <ul class="nav-links">
                <li><a onclick="showSection('oracolo')">Tarocchi</a></li>
                <li><a onclick="showSection('sogni')">Sogni</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <section id="home" class="content-section active">
        <h1>SOGNI E<br>TAROCCHI</h1>
        <p style="text-align:center; font-style:italic; margin-bottom:40px;">"Nulla accade per caso. Ogni simbolo è un messaggio."</p>
        <div style="display:flex; gap:15px; flex-direction:column; align-items:center;">
            <button class="btn-action" style="max-width:300px;" onclick="showSection('oracolo')">Lettura Tarocchi</button>
            <button class="btn-action" style="max-width:300px; background:transparent;" onclick="showSection('sogni')">Analisi dei Sogni</button>
        </div>
    </section>

    <section id="oracolo" class="content-section">
        <h2>GLI ARCANI</h2>
        <div id="tarotBox" class="glass-card">
            <textarea id="qInput" placeholder="Cosa desideri chiedere alle stelle?"></textarea>
            <button class="btn-action" onclick="runTarot()">Estrai le Carte (1 Credito)</button>
        </div>
        <div class="cards-spread" id="spread" style="display:none">
            <div class="tarot-card" id="card0"><div class="card-inner"><div class="card-back">✦</div><div class="card-front" id="cf0"></div></div></div>
            <div class="tarot-card" id="card1"><div class="card-inner"><div class="card-back">✦</div><div class="card-front" id="cf1"></div></div></div>
            <div class="tarot-card" id="card2"><div class="card-inner"><div class="card-back">✦</div><div class="card-front" id="cf2"></div></div></div>
        </div>
        <div id="resT" class="result-box"><div id="contT"></div></div>
    </section>

    <section id="sogni" class="content-section">
        <h2>IL LIBRO DEI SOGNI</h2>
        <div id="dreamBox" class="glass-card">
            <textarea id="dInput" placeholder="Descrivi la tua visione notturna..."></textarea>
            <div class="tag-container" id="tagList">
                <button class="tag-btn" onclick="toggleTag(this, 'Ricorrente')">🔄 Ricorrente</button>
                <button class="tag-btn" onclick="toggleTag(this, 'Incubo')">🌑 Incubo</button>
                <button class="tag-btn" onclick="toggleTag(this, 'Amore')">❤️ Amore</button>
                <button class="tag-btn" onclick="toggleTag(this, 'Lavoro')">💼 Lavoro</button>
                <button class="tag-btn" onclick="toggleTag(this, 'Messaggio')">✉️ Messaggio</button>
            </div>
            <button class="btn-action" onclick="runDream()">Interpreta Visione (1 Credito)</button>
        </div>
        <div id="resD" class="result-box"><div id="contD"></div></div>
    </section>
</div>
