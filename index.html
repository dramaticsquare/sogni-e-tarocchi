<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarocchi dell'Anima — Cartomanzia Online</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET E VARIABILI --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --deep-space: #0D0A1A;
            --surface: rgba(35, 27, 56, 0.4);
            --text: #EDE0C4;
            --text-muted: #9A8A6E;
            --border: rgba(201, 168, 76, 0.2);
        }

        body { 
            background: var(--deep-space); 
            color: var(--text); 
            font-family: 'Cormorant Garamond', serif; 
            margin: 0; 
            line-height: 1.6;
            background-image: radial-gradient(circle at center, #1a152e 0%, #0d0a1a 100%);
        }

        /* NAVBAR */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(13, 10, 26, 0.95); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); padding: 15px 0; 
        }
        .nav-inner { 
            max-width: 1200px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center; 
        }
        .nav-logo { font-family: 'Cinzel Decorative', cursive; color: var(--gold); text-decoration: none; font-size: 1.2rem; cursor: pointer; letter-spacing: 2px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .credit-badge { 
            font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold); 
            border: 1px solid var(--gold); padding: 5px 15px; border-radius: 50px;
            background: rgba(201, 168, 76, 0.1);
        }
        .nav-links { display: flex; gap: 20px; list-style: none; margin: 0; padding: 0; }
        .nav-links a { color: var(--gold-light); text-decoration: none; font-family: 'Cinzel', serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: white; text-shadow: 0 0 10px var(--gold); }

        /* SEZIONI */
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .content-section { display: none; padding: 120px 0 60px; animation: fadeIn 1s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        h1, h2 { font-family: 'Cinzel Decorative', cursive; color: var(--gold-light); font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 10px; text-align: center;}
        .hero-subtitle { text-align: center; font-style: italic; opacity: 0.8; font-size: 1.2rem; margin-bottom: 40px; }

        /* CARDS & FORMS */
        .glass-card { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 24px; padding: 40px; backdrop-filter: blur(10px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        textarea, input { 
            width: 100%; background: rgba(13, 10, 26, 0.8); border: 1px solid var(--border); 
            border-radius: 12px; color: var(--text); padding: 20px; font-size: 1.1rem; 
            font-family: 'Cormorant Garamond', serif; outline: none; margin-bottom: 20px;
            transition: 0.3s; resize: none; min-height: 120px;
        }

        /* BOTTONI */
        .hero-buttons-container { display: flex; gap: 20px; justify-content: center; margin-top: 40px; }
        .tag-btn { 
            background: rgba(61, 43, 107, 0.3); border: 1px solid var(--border); 
            border-radius: 50px; color: #EDE0C4; padding: 12px 24px; 
            cursor: pointer; transition: 0.3s; 
            font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; 
        }
        .tag-btn:hover { border-color: var(--gold); background: rgba(201, 168, 76, 0.15); }

        .btn-action { 
            width: 100%; padding: 20px; border-radius: 12px; font-family: 'Cinzel', serif; 
            cursor: pointer; transition: 0.4s; border: 1px solid var(--gold); 
            background: transparent; color: var(--gold); letter-spacing: 2px; font-weight: bold;
        }
        .btn-action:hover { background: var(--gold); color: var(--deep-space); box-shadow: 0 0 20px rgba(201, 168, 76, 0.4); }

        /* RISULTATI */
        .result-box { 
            display: none; margin-top: 30px; padding: 30px; 
            border: 1px solid var(--border); border-radius: 20px; 
            background: rgba(255,255,255,0.02); line-height: 1.8; font-size: 1.2rem;
        }
        .separator-line { border: none; border-bottom: 1px solid var(--border); margin: 30px 0; opacity: 0.3; }
        .summary-header { display: inline-block; background: var(--gold); color: black; padding: 2px 10px; font-family: 'Cinzel', serif; font-size: 10px; margin-bottom: 15px; border-radius: 4px;}
        strong { color: var(--gold-light); }

        /* MODAL PAGAMENTO */
        #paymentModal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); 
        }
        .modal-content { 
            background: #151126; border: 1px solid var(--gold); padding: 40px; 
            border-radius: 30px; max-width: 500px; width: 90%; text-align: center;
        }
        .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 25px 0; }

        @media (max-width: 600px) { .hero-buttons-container { flex-direction: column; } .price-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a class="nav-logo" onclick="showSection('home')">✦ L'ANIMA</a>
        <div class="nav-right">
            <div class="credit-badge">✨ Crediti: <span id="creditCount">0</span></div>
            <ul class="nav-links">
                <li><a onclick="showSection('oracolo')">TAROCCHI</a></li>
                <li><a onclick="showSection('sogni')">SOGNI</a></li>
                <li><a onclick="showSection('contatto')">CONSULENZA</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <section id="home" class="content-section active">
        <div style="text-align: center; margin-top: 50px;">
            <div style="font-family: 'Cinzel', serif; letter-spacing: 5px; color: var(--gold); font-size: 14px;">ORACOLO DIGITALE</div>
            <h1>TAROCCHI DELL'ANIMA</h1>
            <p class="hero-subtitle">"L'inconscio parla per simboli. Noi siamo qui per tradurli."</p>
            <div class="hero-buttons-container">
                <button class="tag-btn" onclick="showSection('oracolo')">INIZIA LETTURA</button>
                <button class="tag-btn" onclick="showSection('sogni')">SVELA SOGNO</button>
            </div>
        </div>
    </section>

    <section id="oracolo" class="content-section">
        <h2>CONSULTA GLI ARCANI</h2>
        <div class="glass-card">
            <textarea id="questionInput" placeholder="Quale dubbio attanaglia il tuo spirito?"></textarea>
            <button class="btn-action" onclick="handleAction('tarocchi')">ESTRAI LE CARTE (1 Credito)</button>
        </div>
        <div id="readingResult" class="result-box"><div id="readingContent"></div></div>
    </section>

    <section id="sogni" class="content-section">
        <h2>IL LIBRO DEI SOGNI</h2>
        <div class="glass-card">
            <textarea id="dreamInput" placeholder="Racconta la tua visione notturna..."></textarea>
            <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;">
                <button class="tag-btn" onclick="addSymbol('Ricorrente')">🔄 Ricorrente</button>
                <button class="tag-btn" onclick="addSymbol('Amore')">❤️ Amore</button>
                <button class="tag-btn" onclick="addSymbol('Morte')">💀 Morte</button>
                <button class="tag-btn" onclick="addSymbol('Ansia')">😰 Ansia</button>
                <button class="tag-btn" onclick="addSymbol('Controllo')">🎮 Controllo</button>
                <button class="tag-btn" onclick="addSymbol('Nudità')">🫣 Nudità</button>
                <button class="tag-btn" onclick="addSymbol('Sesso')">🔥 Sesso</button>
                <button class="tag-btn" onclick="addSymbol('Libertà')">🦅 Libertà</button>
                <button class="tag-btn" onclick="addSymbol('Potere')">👑 Potere</button>
            </div>
            <button class="btn-action" onclick="handleAction('sogno')">INTERPRETA VISIONE (1 Credito)</button>
        </div>
        <div id="dreamResult" class="result-box"><div id="dreamContent"></div></div>
    </section>

    <section id="contatto" class="content-section">
        <h2>CONSULENZA PERSONALE</h2>
        <div class="glass-card">
            <input type="text" id="cName" placeholder="Nome">
            <input type="email" id="cEmail" placeholder="Email">
            <textarea id="cMessage" placeholder="Messaggio..."></textarea>
            <button class="btn-action" onclick="sendContact()">Invia Richiesta</button>
        </div>
    </section>
</div>

<div id="paymentModal">
    <div class="modal-content">
        <h2 style="font-family: 'Cinzel', serif; color: var(--gold);">Ricarica Energie</h2>
        <div class="price-grid">
            <button class="tag-btn" onclick="setAmount(1)">1€ (1 cr.)</button>
            <button class="tag-btn" onclick="setAmount(5)">5€ (5 cr.)</button>
            <button class="tag-btn" onclick="setAmount(10)">10€ (10 cr.)</button>
        </div>
        <div id="paymentDetails" style="margin: 20px 0; color: var(--gold);">Totale: <span id="displayAmount">1</span>.00€</div>
        <div id="paypal-button-container"></div>
        <button onclick="document.getElementById('paymentModal').style.display='none'" style="background:none; border:none; color:var(--gold); margin-top:20px; cursor:pointer;">CHIUDI</button>
    </div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=IL_TUO_CLIENT_ID&currency=EUR"></script>

<script>
    const MAKE_URL = "https://hook.eu1.make.com/wdc6niacrxs2vlmssjbd592ymzw2859w"; // Incolla qui l'URL del tuo Webhook
    let selectedAmount = 1;

    function initCredits() {
        if (localStorage.getItem('astral_credits') === null) {
            localStorage.setItem('astral_credits', '100'); // SETTATO A 100 PER TEST
        }
        updateCreditUI();
    }

    function updateCreditUI() {
        document.getElementById('creditCount').innerText = localStorage.getItem('astral_credits');
    }

    function consumeCredit() {
        let c = parseInt(localStorage.getItem('astral_credits'));
        localStorage.setItem('astral_credits', (c - 1).toString());
        updateCreditUI();
    }

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function addSymbol(s) {
        const input = document.getElementById('dreamInput');
        input.value += (input.value ? ', ' : '') + s;
    }

    // FORMATTAZIONE RISPOSTA
    function formatResponse(text) {
        let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/### Sintesi/g, '<div class="summary-header">Sintesi</div>');
        html = html.replace(/### Interpretazione dettagliata/g, '<hr class="separator-line"><strong>Interpretazione Dettagliata</strong><br>');
        html = html.replace(/#/g, ''); // Rimuove eventuali # residui
        return html;
    }

    async function handleAction(tipo) {
        const c = parseInt(localStorage.getItem('astral_credits'));
        if (c <= 0) {
            document.getElementById('paymentModal').style.display = 'flex';
            renderPayPal();
            return;
        }

        const input = (tipo === 'tarocchi') ? document.getElementById('questionInput') : document.getElementById('dreamInput');
        const content = (tipo === 'tarocchi') ? document.getElementById('readingContent') : document.getElementById('dreamContent');
        const box = (tipo === 'tarocchi') ? document.getElementById('readingResult') : document.getElementById('dreamResult');

        if (!input.value) return alert("Inserisci un testo.");

        box.style.display = 'block';
        content.innerHTML = "L'universo sta elaborando...";

        try {
            const res = await fetch(MAKE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tipo: tipo, domanda: input.value, descrizione: input.value })
            });
            const text = await res.text();
            content.innerHTML = formatResponse(text) + `<br><br><button class="btn-action" onclick="location.reload()">NUOVA DOMANDA</button>`;
            consumeCredit();
        } catch (e) { content.innerHTML = "Errore di connessione."; }
    }

    // PAYPAL
    function setAmount(val) {
        selectedAmount = val;
        document.getElementById('displayAmount').innerText = val;
        renderPayPal();
    }

    function renderPayPal() {
        const container = document.getElementById('paypal-button-container');
        container.innerHTML = '';
        if(typeof paypal === 'undefined') return;
        
        paypal.Buttons({
            createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: selectedAmount.toString() } }] }),
            onApprove: (data, actions) => actions.order.capture().then(details => {
                let current = parseInt(localStorage.getItem('astral_credits'));
                localStorage.setItem('astral_credits', (current + selectedAmount).toString());
                updateCreditUI();
                document.getElementById('paymentModal').style.display = 'none';
            })
        }).render('#paypal-button-container');
    }

    window.onload = initCredits;
</script>
</body>
</html>
