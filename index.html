<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarocchi dell'Anima — Cartomanzia Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET E VARIABILI --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --gold: #C9A84C; --gold-light: #E8C97A; --deep-space: #0D0A1A;
            --surface: rgba(35, 27, 56, 0.4); --text: #EDE0C4; --text-muted: #9A8A6E;
            --border: rgba(201, 168, 76, 0.2);
        }

        body {
            background-color: var(--deep-space); color: var(--text);
            font-family: 'Cormorant Garamond', serif; font-size: 18px; line-height: 1.6;
            overflow-x: hidden; position: relative;
        }

        /* SFONDO STELLATO */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px), 
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(circle at center, #1a152e 0%, #0d0a1a 100%);
            background-size: 550px 550px, 350px 350px, 100% 100%;
            background-position: 0 0, 40px 60px, center;
            z-index: -1; opacity: 0.4;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* NAVBAR */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(13, 10, 26, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 20px 0;
        }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: 'Cinzel Decorative', cursive; color: var(--gold); text-decoration: none; font-size: 14px; letter-spacing: 0.1em; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 30px; }
        .credit-badge { font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 50px; background: rgba(201, 168, 76, 0.1); }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-family: 'Cinzel', serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; cursor: pointer; transition: 0.3s; }

        /* SEZIONI */
        .content-section { display: none; padding: 160px 0 80px; animation: fadeIn 0.8s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2 { font-family: 'Cinzel Decorative', cursive; color: var(--gold-light); font-size: clamp(35px, 7vw, 75px); line-height: 1.1; margin-bottom: 20px; text-align: center; }
        .hero-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; opacity: 0.8; font-size: 1.2rem; margin-bottom: 40px; text-align: center; }
        
        .hero-buttons-container { display: flex; gap: 20px; justify-content: center; margin-top: 40px; }
        .hero-tag-btn { 
            background: rgba(61, 43, 107, 0.3); border: 1px solid var(--border); border-radius: 50px; 
            color: #EDE0C4; padding: 15px 30px; cursor: pointer; transition: 0.3s; 
            font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; 
        }

        .glass-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; backdrop-filter: blur(8px); margin-top: 40px; }
        textarea { width: 100%; background: rgba(13, 10, 26, 0.6); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 18px; font-family: 'Cormorant Garamond', serif; font-size: 18px; outline: none; margin-bottom: 20px; resize: none; min-height: 120px;}

        .btn-action {
            width: 100%; padding: 20px; border-radius: 12px; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.2em;
            cursor: pointer; transition: 0.4s; text-transform: uppercase; border: 1px solid var(--gold); 
            background: linear-gradient(90deg, #3D2B6B, #5C3D9A); color: white;
        }

        .result-box { display: none; margin-top: 30px; padding: 30px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); border-radius: 20px; }

        /* TAROCCHI VISUAL */
        .cards-spread { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .tarot-card { width: 150px; height: 260px; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s; }
        .tarot-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 10px; border: 1px solid var(--gold); overflow: hidden; }
        .card-back { background: #1A152E; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 40px; }
        .card-front { background: #1E1535; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        .tarot-image { width: 100%; height: 85%; object-fit: cover; border-radius: 5px; transition: transform 0.3s; }
        /* Se rovesciata, ruotiamo solo l'immagine dentro il fronte */
        .is-reversed .tarot-image { transform: rotate(180deg); }
        
        .card-name-label { font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); margin-top: 8px; text-align: center; }
    </style>
</head>
<body>

<nav>
    <div class="container nav-inner">
        <a class="nav-logo" onclick="showSection('home')">✦ TAROCCHI DELL'ANIMA</a>
        <div class="nav-right">
            <div class="credit-badge">✨ Crediti: <span id="creditCount">100</span></div>
            <ul class="nav-links">
                <li><a onclick="showSection('oracolo')">Lettura</a></li>
                <li><a onclick="showSection('sogni')">Sogni</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <section id="home" class="content-section active">
        <h1>TAROCCHI<br>DELL'ANIMA</h1>
        <p class="hero-subtitle">Lascia che gli arcani rivelino ciò che il cuore già conosce.</p>
        <div class="hero-buttons-container">
            <button class="hero-tag-btn" onclick="showSection('oracolo')">INIZIA LETTURA</button>
            <button class="hero-tag-btn" onclick="showSection('sogni')">SVELA SOGNO</button>
        </div>
    </section>

    <section id="oracolo" class="content-section">
        <h2>CONSULTA GLI ARCANI</h2>
        <div id="inputBox" class="glass-card">
            <textarea id="questionInput" placeholder="Qual è la tua domanda?"></textarea>
            <button class="btn-action" onclick="runTarot()">Estrai 3 Carte</button>
        </div>
        
        <div class="cards-spread" id="cardsSpread" style="display:none">
            <div class="tarot-card" id="card0"><div class="card-inner"><div class="card-back">✦</div><div class="card-front" id="cf0"></div></div></div>
            <div class="tarot-card" id="card1"><div class="card-inner"><div class="card-back">✦</div><div class="card-front" id="cf1"></div></div></div>
            <div class="tarot-card" id="card2"><div class="card-inner"><div class="card-back">✦</div><div class="card-front" id="cf2"></div></div></div>
        </div>

        <div id="readingResult" class="result-box">
            <div id="readingContent" style="margin-bottom: 20px;"></div>
            <button class="btn-action" onclick="location.reload()">NUOVA DOMANDA</button>
        </div>
    </section>

    <section id="sogni" class="content-section">
        <h2>IL LIBRO DEI SOGNI</h2>
        <div class="glass-card">
            <textarea id="dreamInput" placeholder="Racconta il tuo sogno..."></textarea>
            <button class="btn-action" onclick="runDream()">Interpreta</button>
        </div>
        <div id="dreamResult" class="result-box">
            <div id="dreamContent"></div>
        </div>
    </section>
</div>

<script>
    const MAKE_URL = "https://hook.eu1.make.com/wdc6niacrxs2vlmssjbd592ymzw2859w";
    
    // IMMAGINI STABILI RIDER-WAITE
    const IMG_BASE = "https://www.sacred-texts.com/tarot/pkt/img/";
    const CARDS = [
        {n: "Il Matto", i: "ar00.jpg"}, {n: "Il Mago", i: "ar01.jpg"}, {n: "La Papessa", i: "ar02.jpg"},
        {n: "L'Imperatrice", i: "ar03.jpg"}, {n: "L'Imperatore", i: "ar04.jpg"}, {n: "Il Papa", i: "ar05.jpg"},
        {n: "Gli Amanti", i: "ar06.jpg"}, {n: "Il Carro", i: "ar07.jpg"}, {n: "La Forza", i: "ar08.jpg"},
        {n: "L'Eremita", i: "ar09.jpg"}, {n: "La Ruota", i: "ar10.jpg"}, {n: "La Giustizia", i: "ar11.jpg"},
        {n: "L'Appeso", i: "ar12.jpg"}, {n: "Morte", i: "ar13.jpg"}, {n: "Temperanza", i: "ar14.jpg"},
        {n: "Il Diavolo", i: "ar15.jpg"}, {n: "La Torre", i: "ar16.jpg"}, {n: "La Stella", i: "ar17.jpg"},
        {n: "La Luna", i: "ar18.jpg"}, {n: "Il Sole", i: "ar19.jpg"}, {n: "Giudizio", i: "ar20.jpg"},
        {n: "Il Mondo", i: "ar21.jpg"}
    ];

    function initCredits() {
        if (!localStorage.getItem('astral_credits')) localStorage.setItem('astral_credits', '100');
        document.getElementById('creditCount').innerText = localStorage.getItem('astral_credits');
    }

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function runTarot() {
        const q = document.getElementById('questionInput').value;
        if (!q) return alert("Inserisci una domanda.");

        document.getElementById('inputBox').style.display = 'none';
        document.getElementById('cardsSpread').style.display = 'flex';

        let chosen = [...CARDS].sort(() => 0.5 - Math.random()).slice(0,3);
        let resultsForMake = [];

        for(let i=0; i<3; i++) {
            const isReversed = Math.random() < 0.5;
            const card = chosen[i];
            const status = isReversed ? "Rovesciata" : "Dritta";
            resultsForMake.push(`${card.n} (${status})`);

            const container = document.getElementById('card' + i);
            const front = document.getElementById('cf' + i);
            
            if(isReversed) container.classList.add('is-reversed');
            
            front.innerHTML = `
                <img src="${IMG_BASE + card.i}" class="tarot-image">
                <div class="card-name-label">${card.n.toUpperCase()} ${isReversed ? '(R)' : ''}</div>
            `;
            
            setTimeout(() => container.classList.add('flipped'), i * 600);
        }

        const resBox = document.getElementById('readingResult');
        const content = document.getElementById('readingContent');
        resBox.style.display = 'block';
        content.innerHTML = "<em>L'universo sta rispondendo...</em>";

        try {
            const response = await fetch(MAKE_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tipo: "tarocchi", domanda: q, carte: resultsForMake.join(", ")})
            });
            const text = await response.text();
            content.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/###/g, '').replace(/#/g, '');
            
            let c = parseInt(localStorage.getItem('astral_credits'));
            localStorage.setItem('astral_credits', c - 1);
            document.getElementById('creditCount').innerText = c - 1;
        } catch (e) {
            content.innerHTML = "Errore di connessione con le sfere celesti. Riprova tra poco.";
        }
    }

    // (La funzione runDream rimane simile, adattata alla grafica)
    async function runDream() {
        const d = document.getElementById('dreamInput').value;
        if (!d) return alert("Racconta il sogno.");
        const content = document.getElementById('dreamContent');
        document.getElementById('dreamResult').style.display = 'block';
        content.innerHTML = "Interpretando i simboli...";
        try {
            const response = await fetch(MAKE_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tipo: "sogno", descrizione: d})
            });
            const text = await response.text();
            content.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/###/g, '').replace(/#/g, '');
        } catch (e) { content.innerHTML = "Errore."; }
    }

    window.onload = initCredits;
</script>
</body>
</html>
